<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Colilla Wheelgrin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Optimización para Safari y dispositivos móviles */
        body { 
            background-color: #f8f9fa; 
            -webkit-font-smoothing: antialiased;
        }
        .card { border-radius: 15px; overflow: hidden; border: none; }
        .bg-dark { background-color: #1a1a1a !important; }
        
        /* Evita estilos nativos de iOS que deforman los botones */
        input, button, select {
            -webkit-appearance: none;
            border-radius: 8px !important;
        }

        .form-label { 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #444; 
            margin-bottom: 4px;
        }

        .btn-success { background-color: #28a745; border: none; }
        .btn-dark { background-color: #1a1a1a; border: none; }
        
        /* Ajuste para que el teclado no tape el formulario en iPhone */
        @media (max-width: 768px) {
            .container { padding-top: 20px; }
            .card-body { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4 class="mb-0">Liquidación Diaria Wheelgrin</h4>
                    </div>
                    <div class="card-body">
                        <form id="pagoForm" method="POST" autocomplete="off">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label">Nombre del Conductor</label>
                                    <input type="text" name="nombre" class="form-control" placeholder="Nombre completo" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Cédula / ID</label>
                                    <input type="number" name="id" class="form-control" inputmode="numeric" required>
                                </div>
                                
                                <div class="col-12">
                                    <label class="form-label text-primary">Efectivo Reportado (Suma con +)</label>
                                    <input type="text" name="efectivo" class="form-control border-primary" placeholder="Ej: 500000+250000">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Comisión (Suma con +)</label>
                                    <input type="text" name="comision" class="form-control" placeholder="Ej: 20000+15000">
                                </div>
                                
                                <div class="col-md-6">
                                    <label class="form-label">Otros Gastos Operativos</label>
                                    <input type="number" name="operativos" class="form-control" inputmode="numeric">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Horas Extra (Normales)</label>
                                    <input type="number" name="horas_extra" step="any" class="form-control" inputmode="decimal" placeholder="0.0">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Horas Festivo</label>
                                    <input type="number" name="horas_festivo" step="any" class="form-control" inputmode="decimal" placeholder="0.0">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Cantidad Tanqueos</label>
                                    <input type="number" name="tanqueos" step="any" class="form-control" inputmode="decimal" placeholder="Ej: 1.5">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Bonos (Semanas)</label>
                                    <input type="number" name="bono" class="form-control" min="0" max="4">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Tipo de Vehículo</label>
                                    <select name="tipo_carro" class="form-select">
                                        <option value="gasolina">Gasolina</option>
                                        <option value="electrico">Eléctrico</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">¿Vive lejos?</label>
                                    <select name="vive_lejos" class="form-select">
                                        <option value="no">No</option>
                                        <option value="si">Sí (Tanqueo $70k)</option>
                                    </select>
                                </div>

                                <div class="col-12">
                                    <label class="form-label fw-bold text-success">Efectivo Entregado Físicamente</label>
                                    <input type="number" name="entrega" class="form-control border-success" inputmode="numeric">
                                </div>
                            </div>

                            <div class="mt-4 d-grid gap-2">
                                <button type="submit" class="btn btn-dark py-2">Calcular Resultados</button>
                                <button type="button" onclick="descargarPDF()" class="btn btn-success py-2">Descargar PDF y Limpiar</button>
                                <a href="/" class="btn btn-link text-secondary btn-sm">Limpiar Formulario</a>
                            </div>
                        </form>

                        {% if resultado %}
                        <div id="seccionResultado" class="mt-4 alert {% if resultado.resultado >= 0 %}alert-primary{% else %}alert-warning{% endif %} shadow-sm border-0">
                            <h5 class="alert-heading text-center mb-0">
                                {% if resultado.resultado > 0 %}
                                    Debe entregar: <strong>${{ "{:,.0f}".format(resultado.resultado) }}</strong>
                                {% else %}
                                    Empresa debe pagar: <strong>${{ "{:,.0f}".format(resultado.resultado | abs) }}</strong>
                                {% endif %}
                            </h5>
                        </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
// 1. RESPALDO PARA SAFARI: Guardar datos al hacer clic en "Calcular"
document.getElementById("pagoForm").addEventListener("submit", function() {
    const formData = new FormData(this);
    for (let [key, value] of formData.entries()) {
        // No guardamos el PDF generado, solo los datos de los campos
        if (key !== 'generar_pdf') {
            localStorage.setItem(key, value);
        }
    }
});

// 2. RECUPERACIÓN: Al cargar la página, si hay resultados, rellenar los campos
window.addEventListener('load', () => {
    const form = document.getElementById("pagoForm");
    const hayResultado = document.getElementById("seccionResultado");

    if (hayResultado) {
        // Solo rellenamos si acabamos de calcular algo
        for (let i = 0; i < form.elements.length; i++) {
            const el = form.elements[i];
            if (el.name && localStorage.getItem(el.name)) {
                el.value = localStorage.getItem(el.name);
            }
        }
    } else {
        // Si entramos a la página de cero (sin resultados), limpiamos todo
        localStorage.clear();
    }
});

// 3. DESCARGA Y LIMPIEZA TOTAL
function descargarPDF() {
    const form = document.getElementById("pagoForm");
    const formData = new FormData(form);
    
    if (!formData.get("nombre")) {
        alert("Por favor ingrese el nombre del conductor");
        return;
    }

    formData.append("generar_pdf", "1");
    document.body.style.cursor = 'wait';

    fetch("/", { method: "POST", body: formData })
    .then(res => {
        if (!res.ok) throw new Error("Error en el servidor");
        return res.blob();
    })
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.style.display = 'none';
        a.href = url;
        
        const nombreConductor = (formData.get("nombre") || "SinNombre").replace(/\s+/g, '_');
        a.download = `Colilla_${nombreConductor}.pdf`;
        
        document.body.appendChild(a);
        a.click();
        
        // Esperamos un momento para que Safari complete la descarga
        setTimeout(() => {
            window.URL.revokeObjectURL(url);
            a.remove();
            
            // AHORA SÍ: Limpiamos la memoria y el formulario
            localStorage.clear(); 
            form.reset();
            document.body.style.cursor = 'default';
            
            // Refrescamos para quedar en blanco para el siguiente conductor
            window.location.href = "/"; 
        }, 1200);
    })
    .catch(err => {
        document.body.style.cursor = 'default';
        alert("Error al generar PDF: " + err.message);
    });
}
    </script>
</body>
</html>
