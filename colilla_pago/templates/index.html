<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Colilla de Pago Conductores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-dark text-white">
<h3 class="text-center">Sistema de Colillas de Pago</h3>
</div>

<div class="card-body">

<form method="post">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Nombre del conductor</label>
<input name="nombre" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">ID</label>
<input name="id" type="number" class="form-control" required>
</div>

</div>


<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Efectivo producido</label>
<input name="efectivo" type="number" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Gastos operativos</label>
<input name="operativos" type="number" class="form-control">
</div>

</div>


<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Comisión</label>
<input name="comision" type="number" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Horas extra</label>
<input name="horas_extra" type="number" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Horas festivo</label>
<input name="horas_festivo" type="number" class="form-control">
</div>

</div>


<div class="row">

<div class="col-md-3 mb-3">
<label class="form-label">Semanas bono</label>
<input name="bono" type="number" min="0" max="4" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Tanqueos</label>
<input name="tanqueos" type="number" min="0" class="form-control" required>
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Tipo de carro</label>
<select name="tipo_carro" class="form-control">
<option value="gasolina">Gasolina</option>
<option value="electrico">Eléctrico</option>
</select>
</div>

<div class="col-md-3 mb-3">
<label class="form-label">¿Vive lejos?</label>
<select name="vive_lejos" class="form-control">
<option value="no">No</option>
<option value="si">Sí</option>
</select>
</div>

</div>

<div class="text-center mt-4">

<button class="btn btn-success btn-lg">
Generar Colilla PDF
</button>

</div>

</form>

</div>

</div>

</div>

</body>
</html>
