<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Colillas Conductores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-dark text-white">
<h3>Colilla de pago conductores</h3>
</div>

<div class="card-body">

<form method="post">

<div class="row">

<div class="col-md-6">
<label>Nombre</label>
<input name="nombre" class="form-control" required>
</div>

<div class="col-md-6">
<label>ID</label>
<input name="id" type="number" class="form-control" required>
</div>

</div>

<br>

<label>Efectivo producido (puedes sumar semanas)</label>
<input name="efectivo" type="text" class="form-control" placeholder="Ej: 582500 + 490000">

<br>

  <label>Entrega del conductor</label>
<input name="entrega" type="number" class="form-control" placeholder="Ej: 300000">
<br>

<div class="row">

<div class="col-md-6">
<label>Gastos operativos</label>
<input name="operativos" type="number" class="form-control">
</div>

<div class="col-md-6">
<label>Comisión</label>
<input name="comision" type="number" class="form-control">
</div>

</div>

<br>

<div class="row">

<div class="col-md-6">
<label>Horas extra</label>
<input name="horas_extra" type="number" class="form-control">
</div>

<div class="col-md-6">
<label>Horas festivo</label>
<input name="horas_festivo" type="number" class="form-control">
</div>

</div>

<br>

<label>Semanas bono</label>
<input name="bono" type="number" min="0" max="4" class="form-control">

<br>

<div class="row">

<div class="col-md-6">

<label>Tipo de carro</label>

<select name="tipo_carro" class="form-control">
<option value="gasolina">Gasolina</option>
<option value="electrico">Eléctrico</option>
</select>

</div>

<div class="col-md-6">

<label>¿Vive lejos?</label>

<select name="vive_lejos" class="form-control">
<option value="no">No</option>
<option value="si">Sí</option>
</select>

</div>

</div>

<br>

<label>Veces que tanqueó gasolina</label>
<input name="tanqueos" type="number" min="0" class="form-control">

<br>

<button class="btn btn-success w-100">
Generar colilla PDF
</button>

</form>

</div>

</div>

</div>

</body>
</html>
