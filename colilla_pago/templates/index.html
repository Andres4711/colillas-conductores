<!DOCTYPE html>
<html>
<head>
<title>Colilla de pago conductores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f4f4;
}

.container{
margin-top:40px;
max-width:700px;
}

.card{
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header bg-dark text-white">
<h4>Colilla de pago conductores</h4>
</div>

<div class="card-body">

<form method="POST">

<div class="row mb-3">

<div class="col">
<label>Nombre</label>
<input type="text" name="nombre" class="form-control" required>
</div>

<div class="col">
<label>ID</label>
<input type="number" name="id" class="form-control" required>
</div>

</div>

<div class="mb-3">
<label>Efectivo producido (puedes sumar semanas)</label>
<input type="text" name="efectivo" class="form-control" placeholder="Ej: 582500 + 490000">
</div>

<div class="mb-3">
<label>Entrega del conductor</label>
<input type="number" name="entrega" class="form-control">
</div>

<div class="row mb-3">

<div class="col">
<label>Gastos operativos</label>
<input type="number" name="operativos" class="form-control">
</div>

<div class="col">
<label>Comisión</label>
<input type="number" name="comision" class="form-control">
</div>

</div>

<div class="row mb-3">

<div class="col">
<label>Horas extra</label>
<input type="number" name="horas_extra" class="form-control">
</div>

<div class="col">
<label>Horas festivo</label>
<input type="number" name="horas_festivo" class="form-control">
</div>

</div>

<div class="mb-3">
<label>Semanas bono</label>
<input type="number" name="bono" class="form-control">
</div>

<div class="row mb-3">

<div class="col">
<label>Tipo de carro</label>
<select name="tipo_carro" class="form-control">

<option value="gasolina">Gasolina</option>
<option value="electrico">Eléctrico</option>

</select>
</div>

<div class="col">
<label>¿Vive lejos?</label>
<select name="vive_lejos" class="form-control">

<option value="no">No</option>
<option value="si">Sí</option>

</select>
</div>

</div>

<div class="mb-3">
<label>Veces que tanqueó gasolina</label>
<input type="number" name="tanqueos" class="form-control">
</div>

<button class="btn btn-success w-100">
Generar colilla PDF
</button>

</form>

</div>
</div>
</div>

</body>
</html>
